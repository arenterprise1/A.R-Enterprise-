<!doctype html>
<html lang="bn">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <!-- Primary App Identity & Meta Tags -->
    <title>এ.আর এন্টারপ্রাইজ - POS ও ব্যবসা খাতা</title>
    <meta name="description" content="এ.আর এন্টারপ্রাইজ - আধুনিক রিটেল ক্যাশ রেজিস্টার, ইনভেন্টরি অটোমেশন, এবং কাস্টম লেবেল ও রিসিট প্রিন্টিং সিস্টেম।" />
    <meta name="theme-color" content="#4f46e5" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

    <!-- Google Fonts for Bengali Content & Modern Display -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;500;600;700&family=Inter:wght@300;400;500;600;700;800;900&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet" />

    <!-- Premium Embedded Vector Favicon (Gradient Ledger & Sparkles) -->
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0%25' y1='0%25' x2='100%25' y2='100%25'%3E%3Cstop offset='0%25' stop-color='%236366f1'/%3E%3Cstop offset='100%25' stop-color='%234f46e5'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect width='24' height='24' rx='6' fill='url(%23g)'/%3E%3Cpath d='M6 18c0-1.657 1.343-3 3-3h9V5a1 1 0 0 0-1-1H9a4 4 0 0 0-4 4v10a1 1 0 0 0 1 1z' fill='%23ffffff' opacity='0.9'/%3E%3Ccircle cx='14' cy='9' r='2' fill='%234f46e5'/%3E%3Crect x='10' y='12' width='6' height='1.5' rx='0.75' fill='%234f46e5'/%3E%3C/svg%3E" />

    <!-- Pure CSS Preloader Styling -->
    <style>
      body {
        margin: 0;
        background-color: #f8fafc;
        font-family: 'Hind Siliguri', 'Inter', -apple-system, sans-serif;
      }
      .app-preloader {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background-color: #f8fafc;
        z-index: 9999;
        transition: opacity 0.4s ease-out, visibility 0.4s ease-out;
      }
      .preloader-card {
        text-align: center;
        display: flex;
        flex-direction: column;
        align-items: center;
        max-width: 320px;
        padding: 24px;
      }
      .app-logo-badge {
        width: 64px;
        height: 64px;
        background: linear-gradient(135deg, #6366f1, #4f46e5);
        border-radius: 20px;
        display: flex;
        align-items: center;
        justify-content: center;
        box-shadow: 0 10px 25px -5px rgba(79, 70, 229, 0.4);
        margin-bottom: 20px;
        position: relative;
        animation: pulseLogo 2s infinite ease-in-out;
      }
      .app-logo-badge svg {
        width: 34px;
        height: 34px;
        fill: white;
      }
      .spinner {
        position: absolute;
        inset: -6px;
        border: 2px solid transparent;
        border-top-color: #818cf8;
        border-radius: 26px;
        animation: spinPreloader 1s linear infinite;
      }
      .app-title {
        color: #0f172a;
        font-size: 22px;
        font-weight: 750;
        margin: 0 0 6px 0;
        letter-spacing: -0.5px;
      }
      .app-subtitle {
        color: #64748b;
        font-size: 13px;
        font-weight: 500;
        margin: 0 0 24px 0;
        letter-spacing: 0.5px;
        text-transform: uppercase;
      }
      .loading-bar-tracker {
        width: 140px;
        height: 4px;
        background-color: #e2e8f0;
        border-radius: 99px;
        overflow: hidden;
        position: relative;
      }
      .loading-bar-fill {
        height: 100%;
        background: linear-gradient(90deg, #6366f1, #4f46e5);
        border-radius: 99px;
        width: 40%;
        animation: loadingAnimation 1.6s infinite ease-in-out;
      }
      @keyframes spinPreloader {
        to { transform: rotate(360deg); }
      }
      @keyframes pulseLogo {
        0%, 100% { transform: scale(1); }
        50% { transform: scale(1.04); }
      }
      @keyframes loadingAnimation {
        0% { left: -40%; width: 40%; }
        50% { width: 60%; }
        100% { left: 100%; width: 40%; }
      }
    </style>
  </head>
  <body>
    <!-- App Container -->
    <div id="root">
      <!-- Full Premium Splash Screen Overlay -->
      <div id="app-startup-loader" class="app-preloader">
        <div class="preloader-card">
          <!-- Animated brand insignia badge -->
          <div class="app-logo-badge">
            <div class="spinner"></div>
            <svg viewBox="0 0 24 24">
              <path d="M6 18c0-1.657 1.343-3 3-3h9V5a1 1 0 0 0-1-1H9a4 4 0 0 0-4 4v10a1 1 0 0 0 1 1z" />
            </svg>
          </div>
          <!-- Title & Slogan -->
          <h1 class="app-title">এ.আর এন্টারপ্রাইজ</h1>
          <p class="app-subtitle">স্মার্ট ক্যাশ রেজিস্টার ও পস</p>
          <!-- Modern non-interruptive progress loader line -->
          <div class="loading-bar-tracker">
            <div class="loading-bar-fill"></div>
          </div>
        </div>
      </div>
    </div>
    
    <!-- Main Script Mounted Automatically -->
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
